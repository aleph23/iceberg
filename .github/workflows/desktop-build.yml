name: Desktop Build (Tauri)

on:
  workflow_dispatch:
    inputs:
      build_llama_cuda_linux:
        description: "Also build Linux desktop with llama.cpp CUDA support"
        required: false
        default: false
        type: boolean
      build_llama_rocm_linux:
        description: "Also build Linux desktop with llama.cpp ROCm support"
        required: false
        default: false
        type: boolean
      build_llama_cpu_linux:
        description: "Build Linux desktop with llama.cpp CPU"
        required: false
        default: true
        type: boolean
      build_llama_cuda_windows:
        description: "Also build Windows desktop with llama.cpp CUDA support"
        required: false
        default: false
        type: boolean
      build_llama_rocm_windows:
        description: "Build Windows ROCm version with llama.cpp ROCm support"
        required: false
        default: false
        type: boolean
      build_llama_cpu_windows:
        description: "Build Windows desktop with llama.cpp CPU"
        required: false
        default: true
        type: boolean
      build_llama_cpu_macos:
        description: "Build macOS desktop with llama.cpp CPU"
        required: false
        default: true
        type: boolean
      build_llama_metal_macos:
        description: "Build macOS desktop with llama.cpp Metal support"
        required: false
        default: false
        type: boolean

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux_cpu:
    name: Linux Build (CPU)
    if: ${{ inputs.build_llama_cpu_linux == true }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      APTABASE_KEY: ${{ secrets.APTABASE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libspeechd-dev \
            patchelf \
            zip

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create dev config override
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          VERSION="0.1.${{ github.run_number }}-dev.$SHORT_SHA"

          cat > dev-config.json << EOF
          {
            "\$schema": "https://schema.tauri.app/config/2",
            "productName": "lettuceai-dev",
            "version": "$VERSION",
            "identifier": "dev.lettuceai.app",
            "build": {
              "beforeDevCommand": "bun run dev",
              "devUrl": "http://localhost:1420",
              "beforeBuildCommand": "bun run build",
              "frontendDist": "../dist"
            },
            "app": {
              "windows": [
                {
                  "title": "LettuceAI (Dev)",
                  "width": 1100,
                  "height": 720,
                  "minHeight": 600,
                  "minWidth": 900,
                  "transparent": true
                }
              ],
              "security": {
                "csp": null,
                "assetProtocol": {
                  "enable": true,
                  "scope": [
                    "\$APPDATA/**"
                  ]
                }
              }
            },
            "bundle": {
              "active": true,
              "targets": ["deb"],
              "icon": [
                "icons/32x32.png",
                "icons/128x128.png",
                "icons/128x128@2x.png",
                "icons/icon.icns",
                "icons/icon.ico"
              ],
              "resources": [
                "./feedback_sounds/fail.mp3",
                "./feedback_sounds/send.mp3",
                "./feedback_sounds/success.mp3",
              ]
            }
          }
          EOF

      - name: Build Tauri binary (Linux, CPU)
        env:
          RUSTFLAGS: "--cfg DEV_BUILD"
        run: bun run tauri build --config dev-config.json --no-bundle

      - name: Bundle Linux CPU deb
        timeout-minutes: 20
        env:
          RUSTFLAGS: "--cfg DEV_BUILD"
        run: bun run tauri bundle --config dev-config.json --bundles deb

      - name: Package Linux CPU bundle zip
        run: |
          mkdir -p dist-artifacts
          cd src-tauri/target/release/bundle
          zip -r ../../../../dist-artifacts/linux-cpu.zip .

      - name: Upload Linux CPU zip
        uses: actions/upload-artifact@v4
        with:
          name: linux-cpu-zip
          path: dist-artifacts/linux-cpu.zip

  linux_cuda:
    name: Linux Build (CUDA)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_llama_cuda_linux == true }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      APTABASE_KEY: ${{ secrets.APTABASE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libspeechd-dev \
            patchelf \
            zip

      - name: Setup CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: "13.1.0"
          method: "network"

      - name: Verify CUDA toolchain
        run: |
          command -v nvcc >/dev/null 2>&1 || {
            echo "nvcc not found (required for llama-gpu-cuda build).";
            exit 1;
          }
          nvcc --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create dev config override
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          VERSION="0.1.${{ github.run_number }}-dev.$SHORT_SHA"

          cat > dev-config.json << EOF
          {
            "\$schema": "https://schema.tauri.app/config/2",
            "productName": "lettuceai-dev",
            "version": "$VERSION",
            "identifier": "dev.lettuceai.app",
            "build": {
              "beforeDevCommand": "bun run dev",
              "devUrl": "http://localhost:1420",
              "beforeBuildCommand": "bun run build",
              "frontendDist": "../dist"
            },
            "app": {
              "windows": [
                {
                  "title": "LettuceAI (Dev)",
                  "width": 1100,
                  "height": 720,
                  "minHeight": 600,
                  "minWidth": 900,
                  "transparent": true
                }
              ],
              "security": {
                "csp": null,
                "assetProtocol": {
                  "enable": true,
                  "scope": [
                    "\$APPDATA/**"
                  ]
                }
              }
            },
            "bundle": {
              "active": true,
              "targets": ["deb"],
              "icon": [
                "icons/32x32.png",
                "icons/128x128.png",
                "icons/128x128@2x.png",
                "icons/icon.icns",
                "icons/icon.ico"
              ],
              "resources": [
                "./feedback_sounds/fail.mp3",
                "./feedback_sounds/send.mp3",
                "./feedback_sounds/success.mp3"
              ]
            }
          }
          EOF

      - name: Build Tauri binary (Linux, llama.cpp CUDA)
        env:
          RUSTFLAGS: "--cfg DEV_BUILD"
          CARGO_TARGET_DIR: target-cuda
          CMAKE_POSITION_INDEPENDENT_CODE: "ON"
          CMAKE_C_FLAGS: "-fPIC"
          CMAKE_CXX_FLAGS: "-fPIC"
          CMAKE_CUDA_FLAGS: "--compiler-options=-fPIC"
        run: bun run tauri build --config dev-config.json --features llama-gpu-cuda --no-bundle

      - name: Bundle Linux CUDA deb
        timeout-minutes: 20
        env:
          RUSTFLAGS: "--cfg DEV_BUILD"
          CARGO_TARGET_DIR: target-cuda
          CMAKE_POSITION_INDEPENDENT_CODE: "ON"
          CMAKE_C_FLAGS: "-fPIC"
          CMAKE_CXX_FLAGS: "-fPIC"
          CMAKE_CUDA_FLAGS: "--compiler-options=-fPIC"
        run: bun run tauri bundle --config dev-config.json --features llama-gpu-cuda --bundles deb

      - name: Package Linux CUDA bundle zip
        run: |
          mkdir -p dist-artifacts
          cd src-tauri/target-cuda/release/bundle
          zip -r ../../../../dist-artifacts/linux-cuda.zip .

      - name: Upload Linux CUDA zip
        uses: actions/upload-artifact@v4
        with:
          name: linux-cuda-zip
          path: dist-artifacts/linux-cuda.zip

  linux_rocm:
    name: Linux Build (ROCm)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_llama_rocm_linux == true }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      APTABASE_KEY: ${{ secrets.APTABASE_KEY }}

    steps:
      - name: Checkout
