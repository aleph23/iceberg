            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libspeechd-dev \
            patchelf \
            libvulkan-dev \
            vulkan-tools \
            libshaderc-dev \
            glslc \
            glslang-tools \
