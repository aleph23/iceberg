      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ca-certificates \
            curl \
            gpg \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libspeechd-dev \
            patchelf \
            zip

      - name: Install ROCm HIP toolchain (Linux)
        run: |
          set -euxo pipefail
          ROCM_SERIES="7.2.0"
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://repo.radeon.com/rocm/rocm.gpg.key | gpg --dearmor | sudo tee /etc/apt/keyrings/rocm.gpg >/dev/null
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/rocm.gpg] https://repo.radeon.com/rocm/apt/latest noble main" | sudo tee /etc/apt/sources.list.d/rocm.list
          sudo apt-get update
          sudo apt-get install -y \
            rocm-core${ROCM_SERIES} \
            rocm-hip-runtime${ROCM_SERIES} \
            rocm-hip-sdk${ROCM_SERIES} \
            hipcc${ROCM_SERIES}
          echo "/opt/rocm/bin" >> "$GITHUB_PATH"
          echo "ROCM_PATH=/opt/rocm" >> "$GITHUB_ENV"
          echo "HIP_PATH=/opt/rocm" >> "$GITHUB_ENV"
          echo "CMAKE_PREFIX_PATH=/opt/rocm" >> "$GITHUB_ENV"

      - name: Verify ROCm toolchain
        run: |
          command -v hipcc >/dev/null 2>&1 || {
            echo "hipcc not found (required for llama-gpu-rocm build).";
            echo "Install ROCm/HIP on this runner image and ensure hipcc is on PATH.";
            exit 1;
          }
          hipcc --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create dev config override
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          VERSION="0.1.${{ github.run_number }}-dev.$SHORT_SHA"

          cat > dev-config.json << EOF
          {
            "\$schema": "https://schema.tauri.app/config/2",
            "productName": "lettuceai-dev",
            "version": "$VERSION",
            "identifier": "dev.lettuceai.app",
            "build": {
              "beforeDevCommand": "bun run dev",
              "devUrl": "http://localhost:1420",
              "beforeBuildCommand": "bun run build",
              "frontendDist": "../dist"
            },
            "app": {
              "windows": [
                {
                  "title": "LettuceAI (Dev)",
                  "width": 1100,
                  "height": 720,
                  "minHeight": 600,
                  "minWidth": 900,
                  "transparent": true
                }
              ],
              "security": {
                "csp": null,
                "assetProtocol": {
                  "enable": true,
                  "scope": [
                    "\$APPDATA/**"
                  ]
                }
              }
            },
            "bundle": {
              "active": true,
              "targets": ["deb"],
              "icon": [
                "icons/32x32.png",
                "icons/128x128.png",
                "icons/128x128@2x.png",
                "icons/icon.icns",
                "icons/icon.ico"
              ],
              "resources": [
                "./feedback_sounds/fail.mp3",
                "./feedback_sounds/send.mp3",
                "./feedback_sounds/success.mp3"
              ]
            }
          }
          EOF

      - name: Build Tauri binary (Linux, llama.cpp ROCm)
        env:
          RUSTFLAGS: "--cfg DEV_BUILD"
          CARGO_TARGET_DIR: target-rocm
          CMAKE_POSITION_INDEPENDENT_CODE: "ON"
          CMAKE_C_FLAGS: "-fPIC"
          CMAKE_CXX_FLAGS: "-fPIC"
          CMAKE_HIP_FLAGS: "-fPIC"
        run: bun run tauri build --config dev-config.json --features llama-gpu-rocm --no-bundle

      - name: Bundle Linux ROCm deb
        timeout-minutes: 20
        env:
          RUSTFLAGS: "--cfg DEV_BUILD"
          CARGO_TARGET_DIR: target-rocm
          CMAKE_POSITION_INDEPENDENT_CODE: "ON"
          CMAKE_C_FLAGS: "-fPIC"
          CMAKE_CXX_FLAGS: "-fPIC"
          CMAKE_HIP_FLAGS: "-fPIC"
        run: bun run tauri bundle --config dev-config.json --features llama-gpu-rocm --bundles deb

      - name: Package Linux ROCm bundle zip
        run: |
          mkdir -p dist-artifacts
          cd src-tauri/target-rocm/release/bundle
          zip -r ../../../../dist-artifacts/linux-rocm.zip .

      - name: Upload Linux ROCm zip
        uses: actions/upload-artifact@v4
        with:
          name: linux-rocm-zip
          path: dist-artifacts/linux-rocm.zip

  windows_cpu:
    name: Windows Build (CPU)
    if: ${{ inputs.build_llama_cpu_windows == true }}
    runs-on: blacksmith-4vcpu-windows-2025
    env:
      APTABASE_KEY: ${{ secrets.APTABASE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Install LLVM (libclang)
        run: |
          choco install llvm -y --no-progress
          echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "C:\\Program Files\\LLVM\\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create dev config override
        run: |
          $VERSION = "0.1.${{ github.run_number }}"

          $devConfig = @"
          {
            "`$schema": "https://schema.tauri.app/config/2",
            "productName": "lettuceai-dev",
            "version": "$VERSION",
            "identifier": "dev.lettuceai.app",
            "build": {
              "beforeDevCommand": "bun run dev",
              "devUrl": "http://localhost:1420",
              "beforeBuildCommand": "bun run build",
              "frontendDist": "../dist"
            },
            "app": {
              "windows": [
                {
                  "title": "LettuceAI (Dev)",
                  "width": 1100,
                  "height": 720,
                  "minHeight": 600,
                  "minWidth": 900,
                  "transparent": true
                }
              ],
              "security": {
                "csp": null,
                "assetProtocol": {
                  "enable": true,
                  "scope": [
                    "`$APPDATA/**"
                  ]
                }
              }
            },
            "bundle": {
              "active": true,
              "targets": ["nsis"],
              "icon": [
                "icons/32x32.png",
                "icons/128x128.png",
                "icons/128x128@2x.png",
                "icons/icon.icns",
                "icons/icon.ico"
              ],
              "resources": [
                "./feedback_sounds/fail.mp3",
                "./feedback_sounds/send.mp3",
                "./feedback_sounds/success.mp3"
              ]
            }
          }
          "@
          $devConfig | Out-File -FilePath dev-config.json -Encoding UTF8

      - name: Build Tauri (Windows, CPU)
        env:
          RUSTFLAGS: "--cfg DEV_BUILD -C target-feature=-crt-static"
          CMAKE_MSVC_RUNTIME_LIBRARY: "MultiThreadedDLL"
        run: bun run tauri build --config dev-config.json

      - name: Package Windows CPU zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-artifacts | Out-Null
          Compress-Archive -Path src-tauri/target/release/bundle/* -DestinationPath dist-artifacts/windows-cpu.zip -Force

      - name: Upload Windows CPU zip
        uses: actions/upload-artifact@v4
        with:
          name: windows-cpu-zip
          path: dist-artifacts/windows-cpu.zip

  windows_cuda:
    name: Windows Build (CUDA)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_llama_cuda_windows == true }}
    runs-on: blacksmith-4vcpu-windows-2025
    env:
      APTABASE_KEY: ${{ secrets.APTABASE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Install LLVM (libclang)
        run: |
          choco install llvm -y --no-progress
          echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "C:\\Program Files\\LLVM\\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: "13.1.0"
          method: "network"

      - name: Verify CUDA toolchain
        shell: pwsh
        run: |
          if (-not (Get-Command nvcc -ErrorAction SilentlyContinue)) {
            Write-Error "nvcc not found (required for llama-gpu-cuda build)."
            exit 1
          }
          nvcc --version

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create dev config override
        run: |
          $VERSION = "0.1.${{ github.run_number }}"

          $devConfig = @"
          {
            "`$schema": "https://schema.tauri.app/config/2",
            "productName": "lettuceai-dev",
            "version": "$VERSION",
            "identifier": "dev.lettuceai.app",
            "build": {
              "beforeDevCommand": "bun run dev",
              "devUrl": "http://localhost:1420",
              "beforeBuildCommand": "bun run build",
              "frontendDist": "../dist"
            },
            "app": {
              "windows": [
                {
                  "title": "LettuceAI (Dev)",
                  "width": 1100,
                  "height": 720,
                  "minHeight": 600,
                  "minWidth": 900,
                  "transparent": true
                }
              ],
              "security": {
                "csp": null,
                "assetProtocol": {
                  "enable": true,
                  "scope": [
                    "`$APPDATA/**"
                  ]
                }
              }
            },
            "bundle": {
              "active": true,
              "targets": ["nsis"],
              "icon": [
                "icons/32x32.png",
                "icons/128x128.png",
                "icons/128x128@2x.png",
                "icons/icon.icns",
                "icons/icon.ico"
              ],
              "resources": [
                "./feedback_sounds/fail.mp3",
                "./feedback_sounds/send.mp3",
                "./feedback_sounds/success.mp3"
              ]
            }
          }
          "@
          $devConfig | Out-File -FilePath dev-config.json -Encoding UTF8

      - name: Build Tauri (Windows, llama.cpp CUDA)
        env:
          RUSTFLAGS: "--cfg DEV_BUILD -C target-feature=-crt-static"
          CMAKE_MSVC_RUNTIME_LIBRARY: "MultiThreadedDLL"
          CARGO_TARGET_DIR: target-cuda
        run: bun run tauri build --config dev-config.json --features llama-gpu-cuda

      - name: Package Windows CUDA zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-artifacts | Out-Null
          Compress-Archive -Path src-tauri/target-cuda/release/bundle/* -DestinationPath dist-artifacts/windows-cuda.zip -Force

      - name: Upload Windows CUDA zip
        uses: actions/upload-artifact@v4
        with:
          name: windows-cuda-zip
          path: dist-artifacts/windows-cuda.zip

  windows_rocm:
    name: Windows Build (ROCm)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_llama_rocm_windows == true }}
    runs-on: blacksmith-4vcpu-windows-2025
    env:
      APTABASE_KEY: ${{ secrets.APTABASE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Install Ninja
        shell: pwsh
        run: choco install ninja -y --no-progress

      - name: Install LLVM (libclang)
        run: |
          choco install llvm -y --no-progress
          echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "C:\\Program Files\\LLVM\\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ROCm HIP toolchain (Windows)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          python --version
          python -m pip install --upgrade pip

          $base = "https://repo.radeon.com/rocm/windows/"
          $index = (Invoke-WebRequest -Uri $base -UseBasicParsing).Content
          $releaseTags = [regex]::Matches($index, 'rocm-rel-([0-9]+(?:\.[0-9]+)*)/') | ForEach-Object { $_.Groups[1].Value } | Sort-Object {[version]$_} -Descending
          if (-not $releaseTags -or $releaseTags.Count -eq 0) {
            throw "Could not detect ROCm Windows release tags at $base"
          }
          $releaseTag = $releaseTags[0]
          $releaseUrl = "$base" + "rocm-rel-$releaseTag/"

          $releaseIndex = (Invoke-WebRequest -Uri $releaseUrl -UseBasicParsing).Content
          $tarMatch = [regex]::Match($releaseIndex, 'href="rocm-([^"]+)\.tar\.gz"')
          if (-not $tarMatch.Success) {
            throw "Could not detect ROCm Python package version in $releaseUrl"
          }
          $rocmVersion = $tarMatch.Groups[1].Value

          Write-Host "Installing rocm[devel,libraries]==$rocmVersion from $releaseUrl"
          python -m pip install "rocm[devel,libraries]==$rocmVersion" --find-links "$releaseUrl"
          python -m rocm_sdk init

          $rocmBin = (python -m rocm_sdk path --bin).Trim()
          $rocmRoot = (python -m rocm_sdk path --root).Trim()
          if (-not (Test-Path (Join-Path $rocmBin "hipcc.bat")) -and -not (Test-Path (Join-Path $rocmBin "hipcc.exe"))) {
            throw "hipcc not found in ROCm bin path: $rocmBin"
          }

          "ROCM_PATH=$rocmRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "HIP_PATH=$rocmRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "HIP_PLATFORM=amd" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CMAKE_PREFIX_PATH=$rocmRoot\lib\cmake" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $rocmBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify ROCm toolchain
        shell: pwsh
        run: |
          if (-not (Get-Command hipcc -ErrorAction SilentlyContinue)) {
            Write-Error "hipcc not found (required for llama-gpu-rocm build). Install AMD HIP SDK/ROCm on the runner image."
            exit 1
          }
          hipcc --version

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create dev config override
        run: |
          $VERSION = "0.1.${{ github.run_number }}"

          $devConfig = @"
          {
            "`$schema": "https://schema.tauri.app/config/2",
            "productName": "lettuceai-dev",
            "version": "$VERSION",
            "identifier": "dev.lettuceai.app",
            "build": {
              "beforeDevCommand": "bun run dev",
              "devUrl": "http://localhost:1420",
              "beforeBuildCommand": "bun run build",
              "frontendDist": "../dist"
            },
            "app": {
              "windows": [
                {
                  "title": "LettuceAI (Dev)",
                  "width": 1100,
                  "height": 720,
                  "minHeight": 600,
                  "minWidth": 900,
                  "transparent": true
                }
              ],
              "security": {
                "csp": null,
                "assetProtocol": {
                  "enable": true,
                  "scope": [
                    "`$APPDATA/**"
                  ]
                }
              }
            },
            "bundle": {
              "active": true,
              "targets": ["nsis"],
              "icon": [
                "icons/32x32.png",
                "icons/128x128.png",
                "icons/128x128@2x.png",
                "icons/icon.icns",
                "icons/icon.ico"
              ],
              "resources": [
                "./feedback_sounds/fail.mp3",
                "./feedback_sounds/send.mp3",
                "./feedback_sounds/success.mp3"
              ]
            }
          }
          "@
          $devConfig | Out-File -FilePath dev-config.json -Encoding UTF8

      - name: Build Tauri (Windows, llama.cpp ROCm)
        env:
          RUSTFLAGS: "--cfg DEV_BUILD -C target-feature=-crt-static"
          CMAKE_MSVC_RUNTIME_LIBRARY: "MultiThreadedDLL"
          CMAKE_GENERATOR: "Ninja"
          CXXFLAGS: "/EHsc"
          CMAKE_C_COMPILER: "clang-cl"
          CMAKE_CXX_COMPILER: "clang-cl"
          CMAKE_HIP_COMPILER: "hipcc"
          CMAKE_HIP_PLATFORM: "amd"
          HIP_PLATFORM: "amd"
          CARGO_TARGET_DIR: target-rocm
        run: bun run tauri build --config dev-config.json --features llama-gpu-rocm

      - name: Package Windows ROCm zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-artifacts | Out-Null
          Compress-Archive -Path src-tauri/target-rocm/release/bundle/* -DestinationPath dist-artifacts/windows-rocm.zip -Force

      - name: Upload Windows ROCm zip
        uses: actions/upload-artifact@v4
        with:
          name: windows-rocm-zip
          path: dist-artifacts/windows-rocm.zip

  macos_cpu:
    name: macOS Build (CPU)
    if: ${{ inputs.build_llama_cpu_macos == true }}
    runs-on: macos-14
    env:
      APTABASE_KEY: ${{ secrets.APTABASE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create dev config override
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          VERSION="0.1.${{ github.run_number }}-dev.$SHORT_SHA"

          cat > dev-config.json << EOF
          {
            "\$schema": "https://schema.tauri.app/config/2",
            "productName": "lettuceai-dev",
            "version": "$VERSION",
            "identifier": "dev.lettuceaiapp",
            "build": {
              "beforeDevCommand": "bun run dev",
              "devUrl": "http://localhost:1420",
              "beforeBuildCommand": "bun run build",
              "frontendDist": "../dist"
            },
            "app": {
              "windows": [
                {
                  "title": "LettuceAI (Dev)",
                  "width": 1100,
                  "height": 720,
                  "minHeight": 600,
                  "minWidth": 900,
                  "transparent": true
                }
              ],
              "security": {
                "csp": null,
                "assetProtocol": {
                  "enable": true,
                  "scope": [
                    "\$APPDATA/**"
                  ]
                }
              }
            },
            "bundle": {
              "active": true,
              "targets": ["app", "dmg"],
              "macOS": {
                "minimumSystemVersion": "11.0",
                "dmg": {
                  "windowSize": {
                    "width": 660,
                    "height": 400
                  },
                  "appPosition": {
                    "x": 180,
                    "y": 170
                  },
                  "applicationFolderPosition": {
                    "x": 480,
                    "y": 170
                  }
                }
              },
              "icon": [
                "icons/32x32.png",
                "icons/128x128.png",
                "icons/128x128@2x.png",
                "icons/icon.icns",
                "icons/icon.ico"
              ],
              "resources": [
                "./feedback_sounds/fail.mp3",
                "./feedback_sounds/send.mp3",
                "./feedback_sounds/success.mp3"
              ]
            }
          }
          EOF

      - name: Build and bundle Tauri (macOS, CPU)
        env:
          RUSTFLAGS: "--cfg DEV_BUILD"
        run: bun run tauri build --config dev-config.json --bundles app,dmg

      - name: Package macOS artifacts
        run: |
          mkdir -p dist-artifacts
          ditto -c -k --sequesterRsrc --keepParent src-tauri/target/release/bundle/macos/*.app dist-artifacts/macos-app.zip
          cp src-tauri/target/release/bundle/dmg/*.dmg dist-artifacts/

      - name: Upload macOS app zip
        uses: actions/upload-artifact@v4
        with:
          name: macos-app-zip
          path: dist-artifacts/macos-app.zip

      - name: Upload macOS dmg
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist-artifacts/*.dmg

