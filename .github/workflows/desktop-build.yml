  windows_vulkan:
    name: Windows Build (Vulkan)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_llama_vulkan_windows == true }}
    runs-on: blacksmith-4vcpu-windows-2025
    env:
      APTABASE_KEY: ${{ secrets.APTABASE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Install Ninja
        shell: pwsh
        run: choco install ninja -y --no-progress

      - name: Install LLVM (libclang)
        run: |
          choco install llvm -y --no-progress
          echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "C:\\Program Files\\LLVM\\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = (Invoke-WebRequest -Uri "https://vulkan.lunarg.com/sdk/latest/windows.txt" -UseBasicParsing).Content.Trim()
          $installer = Join-Path $env:TEMP "vulkan_sdk.exe"
          $installDir = "C:\VulkanSDK\$version"
          $downloadUrl = "https://sdk.lunarg.com/sdk/download/$version/windows/vulkan_sdk.exe?Human=true"
          $shaInfoUrl = "https://sdk.lunarg.com/sdk/sha/$version/windows/vulkan_sdk.exe.json"

          Invoke-WebRequest -Uri $downloadUrl -OutFile $installer
          $shaInfo = Invoke-RestMethod -Uri $shaInfoUrl
          $actualSha = (Get-FileHash -Path $installer -Algorithm SHA256).Hash.ToLower()
          if ($actualSha -ne $shaInfo.sha.ToLower()) {
            Write-Error "Vulkan SDK SHA mismatch. Expected $($shaInfo.sha), got $actualSha"
            exit 1
          }

          # Qt installer style unattended install args documented by LunarG.
          $installArgs = @(
            "--root", $installDir,
            "--accept-licenses",
            "--default-answer",
            "--confirm-command",
            "install"
          )
          $proc = Start-Process -FilePath $installer -ArgumentList $installArgs -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            Write-Error "Vulkan SDK installer failed with exit code $($proc.ExitCode)"
            exit 1
          }

          if (-not (Test-Path "$installDir\Bin\glslc.exe")) {
            Write-Error "glslc not found after Vulkan SDK install at $installDir"
            exit 1
          }

          "VULKAN_SDK=$installDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$installDir\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Write-Host "Vulkan SDK installed at $installDir"

      - name: Verify Vulkan toolchain
        shell: pwsh
        run: |
          if (-not (Get-Command glslc -ErrorAction SilentlyContinue)) {
            Write-Error "glslc not found (required for llama-gpu-vulkan build)."
            exit 1
          }
          glslc --version

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create dev config override
        run: |
          $VERSION = "0.1.${{ github.run_number }}"

          $devConfig = @"
          {
            "`$schema": "https://schema.tauri.app/config/2",
            "productName": "lettuceai-dev",
            "version": "$VERSION",
            "identifier": "dev.lettuceai.app",
            "build": {
              "beforeDevCommand": "bun run dev",
              "devUrl": "http://localhost:1420",
              "beforeBuildCommand": "bun run build",
              "frontendDist": "../dist"
            },
            "app": {
              "windows": [
                {
                  "title": "LettuceAI (Dev)",
                  "width": 1100,
                  "height": 720,
                  "minHeight": 600,
                  "minWidth": 900,
                  "transparent": true
                }
              ],
              "security": {
                "csp": null,
                "assetProtocol": {
                  "enable": true,
                  "scope": [
                    "`$APPDATA/**"
                  ]
                }
              }
            },
            "bundle": {
              "active": true,
              "targets": ["nsis"],
              "icon": [
                "icons/32x32.png",
                "icons/128x128.png",
                "icons/128x128@2x.png",
                "icons/icon.icns",
                "icons/icon.ico"
              ],
              "resources": [
                "./feedback_sounds/fail.mp3",
                "./feedback_sounds/send.mp3",
                "./feedback_sounds/success.mp3"
              ]
            }
          }
          "@
          $devConfig | Out-File -FilePath dev-config.json -Encoding UTF8

      - name: Build Tauri (Windows, llama.cpp Vulkan)
        env:
          RUSTFLAGS: "--cfg DEV_BUILD -C target-feature=-crt-static"
          CMAKE_MSVC_RUNTIME_LIBRARY: "MultiThreadedDLL"
          CMAKE_GENERATOR: "Ninja"
          CARGO_TARGET_DIR: target-vulkan
        run: bun run tauri build --config dev-config.json --features llama-gpu-vulkan

      - name: Package Windows Vulkan zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-artifacts | Out-Null
          Compress-Archive -Path src-tauri/target-vulkan/release/bundle/* -DestinationPath dist-artifacts/windows-vulkan.zip -Force

      - name: Upload Windows Vulkan zip
        uses: actions/upload-artifact@v4
        with:
          name: windows-vulkan-zip
          path: dist-artifacts/windows-vulkan.zip

  macos_cpu:
    name: macOS Build (CPU)
    if: ${{ inputs.build_llama_cpu_macos == true }}
    runs-on: macos-14
    env:
      APTABASE_KEY: ${{ secrets.APTABASE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create dev config override
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          VERSION="0.1.${{ github.run_number }}-dev.$SHORT_SHA"

          cat > dev-config.json << EOF
          {
            "\$schema": "https://schema.tauri.app/config/2",
            "productName": "lettuceai-dev",
            "version": "$VERSION",
            "identifier": "dev.lettuceaiapp",
            "build": {
              "beforeDevCommand": "bun run dev",
              "devUrl": "http://localhost:1420",
              "beforeBuildCommand": "bun run build",
              "frontendDist": "../dist"
            },
            "app": {
              "windows": [
                {
                  "title": "LettuceAI (Dev)",
                  "width": 1100,
                  "height": 720,
                  "minHeight": 600,
                  "minWidth": 900,
                  "transparent": true
                }
              ],
              "security": {
                "csp": null,
                "assetProtocol": {
                  "enable": true,
                  "scope": [
                    "\$APPDATA/**"
                  ]
                }
              }
            },
            "bundle": {
              "active": true,
              "targets": ["app", "dmg"],
              "macOS": {
                "minimumSystemVersion": "11.0",
                "dmg": {
                  "windowSize": {
                    "width": 660,
                    "height": 400
                  },
                  "appPosition": {
                    "x": 180,
                    "y": 170
                  },
                  "applicationFolderPosition": {
                    "x": 480,
                    "y": 170
                  }
                }
              },
              "icon": [
                "icons/32x32.png",
                "icons/128x128.png",
                "icons/128x128@2x.png",
                "icons/icon.icns",
                "icons/icon.ico"
              ],
              "resources": [
                "./feedback_sounds/fail.mp3",
                "./feedback_sounds/send.mp3",
                "./feedback_sounds/success.mp3"
              ]
            }
          }
          EOF

      - name: Build and bundle Tauri (macOS, CPU)
        env:
          RUSTFLAGS: "--cfg DEV_BUILD"
        run: bun run tauri build --config dev-config.json --bundles app,dmg

      - name: Package macOS artifacts
        run: |
          mkdir -p dist-artifacts
          ditto -c -k --sequesterRsrc --keepParent src-tauri/target/release/bundle/macos/*.app dist-artifacts/macos-app.zip
          cp src-tauri/target/release/bundle/dmg/*.dmg dist-artifacts/

      - name: Upload macOS app zip
        uses: actions/upload-artifact@v4
        with:
          name: macos-app-zip
          path: dist-artifacts/macos-app.zip

      - name: Upload macOS dmg
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist-artifacts/*.dmg

